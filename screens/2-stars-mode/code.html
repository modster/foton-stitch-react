<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Public Sans', sans-serif; }

    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-zinc-950 text-zinc-100 min-h-screen selection:bg-tertiary-dim selection:text-white" data-mode="connect">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-slate-950/40 backdrop-blur-md flex justify-between items-center px-4 h-16 border-b border-zinc-800 shadow-sm">
<div class="flex items-center gap-4">
<button class="p-2 text-zinc-100 hover:bg-zinc-800/50 transition-all duration-200 ease-in-out rounded-full" style="">
<span class="material-symbols-outlined" style="">settings</span>
</button>
<button class="p-2 text-zinc-400 hover:bg-zinc-800/50 transition-all duration-200 ease-in-out rounded-full" style="">
<span class="material-symbols-outlined" style="">videocam</span>
</button>
<button class="p-2 text-zinc-400 hover:bg-zinc-800/50 transition-all duration-200 ease-in-out rounded-full" style="">
<span class="material-symbols-outlined" style="">exposure</span>
</button>
</div>
<h1 class="font-headline tracking-tight text-lg font-semibold text-zinc-100" style="">Stars</h1>
<div class="flex items-center gap-2">
<div class="px-2 py-1 bg-zinc-900 border border-zinc-800 rounded text-[10px] font-mono tracking-widest text-zinc-400" style="">
                4K 60FPS
            </div>
<button class="p-2 text-zinc-100 hover:bg-zinc-800/50 transition-all duration-200 ease-in-out rounded-full" style="">
<span class="material-symbols-outlined" style="">more_vert</span>
</button>
</div>
</header>
<!-- Main Viewfinder Canvas -->
<main class="relative w-full h-[884px] pt-16 pb-32 overflow-hidden flex flex-col items-center justify-center">
<!-- Viewfinder Background -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover brightness-75 contrast-125" data-alt="stunning clear night sky full of stars above a dark silhouette of jagged mountain peaks with deep navy and black tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDhFoAGBqa3eIFx1MxkqEMSUSsw6Fkpkl7FG5sLrc9Yq9-XD2EuHG87yR1g2JnzGFTZfsjM9okueV9-utAX0YE7k1lOe2wzO2O9Kss7trykCVmqSBQxmiJgcyQkDKhOpbCdjAXe_-d7pT11owDdUKq_tC8tF8eEfYD6LyFkIeXugBBXkpUYePJLmy-8BZtIs1dBM9PttwnB111qDWMKTGGsDhm_CAPfSupvDRtMSOMw0qpxDGFwPj4iSFXXHCBoi2aIIY_CeStXVQY" style="">

<div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
<div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-transparent opacity-40"></div>
</div>
<!-- Center Crosshair / Level -->
<div class="relative z-10 w-full max-w-xs aspect-square border-[0.5px] border-white/10 rounded-full flex items-center justify-center pointer-events-none">
<div class="w-8 h-[1px] bg-white/40 absolute left-0"></div>
<div class="w-8 h-[1px] bg-white/40 absolute right-0"></div>
<div class="w-[1px] h-8 bg-white/40 absolute top-0"></div>
<div class="w-[1px] h-8 bg-white/40 absolute bottom-0"></div>
<div class="w-1 h-1 bg-tertiary rounded-full shadow-[0_0_8px_#866e97]"></div>
</div>
<!-- Technical Overlays (ISO, SS, EV) -->
<div class="absolute top-20 left-4 z-20 flex flex-col gap-2">
<div class="bg-black/60 backdrop-blur-md border border-white/10 px-3 py-1.5 rounded-lg flex items-center gap-3">
<span class="text-[10px] font-bold text-zinc-500 tracking-tighter uppercase" style="">ISO</span>
<span class="text-sm font-mono font-medium text-zinc-100" style="">3200</span>
</div>
<div class="bg-black/60 backdrop-blur-md border border-white/10 px-3 py-1.5 rounded-lg flex items-center gap-3">
<span class="text-[10px] font-bold text-zinc-500 tracking-tighter uppercase" style="">SEC</span>
<span class="text-sm font-mono font-medium text-zinc-100" style="">120s</span>
</div>
<div class="bg-black/60 backdrop-blur-md border border-white/10 px-3 py-1.5 rounded-lg flex items-center gap-3">
<span class="text-[10px] font-bold text-zinc-500 tracking-tighter uppercase" style="">EV</span>
<span class="text-sm font-mono font-medium text-tertiary-dim" style="">-1.0</span>
</div>
</div>
<!-- Right Side Quick Controls -->
<div class="absolute right-4 top-20 z-20 flex flex-col gap-4">
<button class="w-12 h-12 bg-black/40 backdrop-blur-xl border border-white/10 rounded-full flex items-center justify-center text-zinc-400" style="">
<span class="material-symbols-outlined text-[20px]" style="">timer</span>
</button>
<button class="w-12 h-12 bg-black/40 backdrop-blur-xl border border-white/10 rounded-full flex items-center justify-center text-zinc-400" style="">
<span class="material-symbols-outlined text-[20px]" style="">flash_off</span>
</button>
<button class="w-12 h-12 bg-black/40 backdrop-blur-xl border border-white/10 rounded-full flex items-center justify-center text-zinc-400" style="">
<span class="material-symbols-outlined text-[20px]" style="">straighten</span>
</button>
</div>
<!-- Stars Specific Control Panel (Bento Style Card) -->
<div class="absolute bottom-40 left-4 right-4 z-20 grid grid-cols-2 gap-3">
<!-- Tracking Toggle -->
<div class="bg-zinc-900/80 backdrop-blur-2xl border border-zinc-800 p-3 rounded-xl flex items-center justify-between">
<div>
<p class="text-[10px] text-zinc-500 font-bold tracking-wider uppercase" style="">Tracking</p>
<p class="text-sm font-semibold text-zinc-100 mt-0.5" style="">ON</p>
</div>
<div class="w-10 h-5 bg-tertiary/20 rounded-full relative flex items-center px-1 border border-tertiary/30">
<div class="absolute right-1 w-3 h-3 bg-tertiary rounded-full"></div>
</div>
</div>
<!-- Noise Reduction -->
<div class="bg-zinc-900/80 backdrop-blur-2xl border border-zinc-800 p-3 rounded-xl">
<p class="text-[10px] text-zinc-500 font-bold tracking-wider uppercase" style="">Noise Reduction</p>
<div class="flex gap-2 mt-2">
<div class="flex-1 h-1 bg-zinc-800 rounded-full">
<div class="w-3/4 h-full bg-zinc-400 rounded-full"></div>
</div>
</div>
<p class="text-[10px] text-zinc-300 mt-1.5 text-right font-medium" style="">HIGH</p>
</div>
<!-- Trail Length Slider -->
<div class="bg-zinc-900/80 backdrop-blur-2xl border border-zinc-800 p-4 rounded-xl col-span-2">
<div class="flex justify-between items-center mb-4">
<p class="text-[10px] text-zinc-500 font-bold tracking-wider uppercase" style="">Trail Length</p>
<p class="text-xs font-semibold text-tertiary-fixed-dim" style="">Long Exposure</p>
</div>
<div class="relative h-8 flex items-center">
<!-- Slider Track -->
<div class="absolute w-full h-1 bg-zinc-800 rounded-full"></div>
<!-- Slider Marks -->
<div class="absolute w-full flex justify-between px-1">
<div class="w-1 h-1 bg-zinc-700 rounded-full"></div>
<div class="w-1 h-1 bg-zinc-700 rounded-full"></div>
<div class="w-1 h-1 bg-zinc-700 rounded-full"></div>
<div class="w-1 h-1 bg-zinc-700 rounded-full"></div>
</div>
<!-- Slider Progress -->
<div class="absolute left-0 w-[75%] h-1 bg-tertiary rounded-full"></div>
<!-- Thumb -->
<div class="absolute left-[75%] -translate-x-1/2 w-6 h-6 bg-zinc-100 rounded-full shadow-lg border-4 border-zinc-900 flex items-center justify-center"></div>
</div>
<div class="flex justify-between mt-2 text-[10px] font-bold text-zinc-500 uppercase tracking-tighter">
<span class="" style="">Short</span>
<span class="" style="">Medium</span>
<span class="text-tertiary" style="">Long</span>
<span class="" style="">Infinite</span>
</div>
</div>
</div>
<!-- Mode Selector -->
<div class="absolute bottom-24 w-full z-30 overflow-x-auto no-scrollbar">
<div class="flex items-center justify-center gap-8 px-8 py-2 min-w-max">
<button class="text-[11px] font-bold text-zinc-500 tracking-widest uppercase transition-colors" style="">Day</button>
<button class="text-[11px] font-bold text-zinc-500 tracking-widest uppercase transition-colors" style="">Water</button>
<div class="flex flex-col items-center gap-1">
<button class="text-[11px] font-bold text-tertiary tracking-widest uppercase" style="">Stars</button>
<div class="w-1 h-1 bg-tertiary rounded-full"></div>
</div>
<button class="text-[11px] font-bold text-zinc-500 tracking-widest uppercase transition-colors" style="">Trails</button>
<button class="text-[11px] font-bold text-zinc-500 tracking-widest uppercase transition-colors" style="">Bulb</button>
</div>
</div>
</main>
<!-- BottomNavBar (Customized for Camera Context) -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-zinc-950/90 backdrop-blur-lg flex justify-between items-center px-8 h-24 border-t border-zinc-900">
<!-- Gallery Thumbnail -->
<div class="w-12 h-12 rounded-lg border border-zinc-800 overflow-hidden bg-zinc-900">
<img class="w-full h-full object-cover" data-alt="dramatic mountain silhouette at dusk with first stars appearing in the sky, sharp focus on rock texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDjcnvtx_pKp_9PkUWu-FEr7S-9pN_fTo4uzeKvbTCQNKaQGyIQnwL6McQDNefGC4antHO84Di3n_P0rpCV66vV51e8gp2-HjxC5BWTooUhlUAgw2vVQqkiQQwKcMOdMBu81o9l5i4HmGFH9-1Nh8BdLB58qCdjaHmkaAeDWWxpPzbgFgRcVlASs3QcWNrS8JGLc0Gz8fZclRKggWMOjQJhFLN7_jjHxatevUYE0QLiPdrMobVw8VO7bQW7_QItRwSodZ7OQE4umJY" style="">
</div>
<!-- Shutter Button -->
<div class="relative group cursor-pointer">
<!-- Progress Ring -->
<svg class="absolute -inset-2 w-20 h-20 rotate-[-90deg]">
<circle class="text-zinc-800" cx="40" cy="40" fill="transparent" r="34" stroke="currentColor" stroke-width="3"></circle>
<circle class="text-tertiary" cx="40" cy="40" fill="transparent" r="34" stroke="currentColor" stroke-dasharray="213" stroke-dashoffset="140" stroke-width="3"></circle>
</svg>
<div class="w-16 h-16 bg-zinc-100 rounded-full flex items-center justify-center transition-transform active:scale-90 duration-150">
<div class="w-14 h-14 border-2 border-zinc-950/10 rounded-full"></div>
</div>
</div>
<!-- Lens Switcher -->
<div class="flex items-center bg-zinc-900/50 p-1 rounded-full border border-zinc-800">
<button class="w-8 h-8 flex items-center justify-center text-[10px] font-bold text-zinc-100 bg-zinc-800 rounded-full" style="">1x</button>
<button class="w-8 h-8 flex items-center justify-center text-[10px] font-bold text-zinc-500" style="">2.5x</button>
</div>
</footer>
<!-- Hidden standard nav items for visual alignment to rules -->
<div class="hidden">
<span data-icon="photo_camera" class="" style="">photo_camera</span>
<span data-icon="videocam" class="" style="">videocam</span>
<span data-icon="shutter_speed" class="" style="">shutter_speed</span>
<span data-icon="auto_awesome_motion" class="" style="">auto_awesome_motion</span>
</div>
