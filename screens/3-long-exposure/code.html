<header class="fixed top-0 w-full z-50 bg-zinc-950/80 border-b border-zinc-800 flex justify-between items-center px-4 h-14 relative">

<button class="text-violet-400 hover:bg-zinc-800 transition-colors active:scale-95 duration-150 p-2 rounded-full">

</button>
<button class="text-violet-400 hover:bg-zinc-800 transition-colors active:scale-95 duration-150 p-2 rounded-full" title="Long Exposure">
<span class="material-symbols-outlined" data-icon="motion_photos_on">motion_photos_on</span>
</button>
</div>
<div class="absolute left-1/2 -translate-x-1/2 pointer-events-none">
<h1 class="font-geist tracking-tight text-lg font-black text-zinc-100">Exposure</h1>

<span class="text-[10px] font-bold text-emerald-400 bg-emerald-400/10 px-2 py-0.5 border border-emerald-400/20 rounded">RAW</span>
<button class="text-violet-400 hover:bg-zinc-800 transition-colors active:scale-95 duration-150 p-2 rounded-full">

<span class="text-sm font-black text-primary">400</span>
</div>
<div class="flex flex-col items-center bg-zinc-950/40 backdrop-blur-sm border border-zinc-800/50 p-2 rounded-xl">
<span class="text-[10px] text-zinc-500 font-bold uppercase tracking-tighter">SEC</span>
<span class="text-sm font-black text-primary">30s</span>
</div>
</div>
<div class="flex flex-col items-end gap-2 pointer-events-auto">
<div class="flex flex-col items-center bg-zinc-950/40 backdrop-blur-sm border border-zinc-800/50 px-3 py-4 rounded-full gap-4">

<span class="material-symbols-outlined text-lg" data-icon="add">add</span>
</button>

<span class="material-symbols-outlined text-lg" data-icon="remove">remove</span>
</button>
</div>
</div>
</div>

<button class="flex-none text-zinc-400 font-geist font-medium text-sm hover:text-zinc-200 transition-all duration-200 uppercase tracking-widest">Bulb</button>
<button class="flex-none text-zinc-400 font-geist font-medium text-sm hover:text-zinc-200 transition-all duration-200 uppercase tracking-widest">Blend</button>
</div>
</div>
