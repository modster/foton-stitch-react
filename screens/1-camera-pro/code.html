<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Obsidian Camera - Pro Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "on-primary-fixed": "#2e1065",
                    "surface-variant": "#18181b",
                    "surface": "#0c0c0f",

                    "surface-container-high": "#18181b",
                    "on-surface": "#fafafa",
                    "on-surface-variant": "#a1a1aa",
                    "surface-container-highest": "#1e1e22",
                    "primary": "#a78bfa",
                    "outline-variant": "#27272a",
                    "surface-dim": "#0c0c0f",
                    "on-tertiary": "#001a12",
                    "secondary-fixed-dim": "#71717a",
                    "on-background": "#fafafa",
                    "secondary": "#71717a",
                    "on-tertiary-fixed": "#003318",
                    "on-primary-container": "#ede9fe",
                    "inverse-primary": "#5b21b6",
                    "primary-fixed": "#ede9fe",
                    "on-error": "#1a0000",
                    "inverse-on-surface": "#09090b",
                    "background": "#09090b",
                    "outline": "#52525b",
                    "surface-bright": "#18181b",
                    "surface-container-lowest": "#09090b",
                    "on-secondary-container": "#a1a1aa",
                    "on-secondary-fixed": "#18181b",
                    "on-primary-fixed-variant": "#5b21b6",
                    "on-secondary-fixed-variant": "#3f3f46",
                    "on-primary": "#0a0012",
                    "on-tertiary-fixed-variant": "#047857",
                    "secondary-fixed": "#a1a1aa",

                    "primary-container": "#7c3aed",
                    "error": "#ef4444",
                    "surface-container-low": "#0f0f12",
                    "primary-fixed-dim": "#c4b5fd",
                    "on-secondary": "#09090b",
                    "surface-tint": "#a78bfa",
                    "error-container": "#3b1111",
                    "tertiary-fixed": "#bbf7d0",
                    "inverse-surface": "#fafafa",
                    "tertiary": "#34d399",
                    "secondary-container": "#27272a",
                    "on-tertiary-container": "#bbf7d0",
                    "on-error-container": "#fca5a5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",

                    "full": "9999px"

            "fontFamily": {
                    "headline": ["Geist"],
                    "body": ["Geist"],
                    "label": ["Geist"]

<style>
        body { font-family: 'Geist', sans-serif; background-color: #09090b; color: #fafafa; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .viewfinder-gradient {
            background: linear-gradient(180deg, rgba(9,9,11,0.6) 0%, rgba(9,9,11,0) 20%, rgba(9,9,11,0) 80%, rgba(9,9,11,0.6) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background overflow-hidden h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-zinc-950/80 border-b border-zinc-800 flex justify-between items-center px-4 h-14 w-full relative">
<div class="flex items-center gap-1">
<button class="text-violet-400 hover:bg-zinc-800 transition-colors active:scale-95 duration-150 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<button class="text-violet-400 hover:bg-zinc-800 transition-colors active:scale-95 duration-150 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="videocam">videocam</span>
</button>
<button class="text-violet-400 hover:bg-zinc-800 transition-colors active:scale-95 duration-150 p-2 rounded-full" title="Long Exposure">
<span class="material-symbols-outlined" data-icon="motion_photos_on">motion_photos_on</span>
</button>
</div>
<div class="absolute left-1/2 -translate-x-1/2 pointer-events-none">
<h1 class="font-geist tracking-tight text-lg font-black text-zinc-100">Camera</h1>
</div>
<div class="flex items-center gap-2">
<span class="text-[10px] font-bold text-emerald-400 bg-emerald-400/10 px-2 py-0.5 border border-emerald-400/20 rounded">RAW</span>
<button class="text-violet-400 hover:bg-zinc-800 transition-colors active:scale-95 duration-150 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="flash_on">flash_on</span>
</button>
</div>
</header>
<!-- Main Viewfinder Area -->
<main class="flex-grow relative flex items-center justify-center pt-14 pb-48">
<!-- High-quality outdoor landscape background -->
<div class="absolute inset-0 z-0">
<img alt="Mountain landscape" class="w-full h-full object-cover" data-alt="dramatic wide angle mountain peak landscape at sunrise with jagged peaks and golden mist in a high-contrast cinematic style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCLFjwl66Q75G-wP2KyFHYrB56JwJfoSu3KNWBug0pKc6DkR_j2-iv8tUjsFgK0u71HfGxUfOeo33LVMEZm6o1n7lZaVSrhI-8cwNrYyw97URmdbhGJsqbvpq1C_9Kn1s98c5cHfyR5dQHn5mVnFn7jnpkKdzKVAEMAES53u-QU78ZHRzQbQgckH8MwGNAsugerc0HAhUFNrx1KtpesmWDv_PbU-xJV7NpDZiXC1d0gYTFms5VD2gSmrkTuUAqfszMNyoDntj_CbxQ"/>
<div class="absolute inset-0 viewfinder-gradient pointer-events-none"></div>
</div>
<!-- Overlaid Manual Controls: Top HUD -->
<div class="absolute top-20 w-full px-6 flex justify-between items-start z-10 pointer-events-none">
<div class="flex flex-col gap-1 pointer-events-auto">
<div class="bg-zinc-950/60 backdrop-blur-md border border-zinc-800 rounded px-2 py-1 flex flex-col">
<span class="text-[9px] text-zinc-500 font-bold uppercase tracking-tighter">Shutter</span>
<span class="text-xs font-mono text-zinc-100">1/500</span>
</div>
<div class="bg-zinc-950/60 backdrop-blur-md border border-zinc-800 rounded px-2 py-1 flex flex-col">
<span class="text-[9px] text-zinc-500 font-bold uppercase tracking-tighter">ISO</span>
<span class="text-xs font-mono text-zinc-100">200</span>
</div>
</div>
<div class="flex flex-col gap-1 items-end pointer-events-auto">
<div class="bg-zinc-950/60 backdrop-blur-md border border-zinc-800 rounded px-2 py-1 flex flex-col items-end">
<span class="text-[9px] text-zinc-500 font-bold uppercase tracking-tighter">EV</span>
<span class="text-xs font-mono text-violet-400">-0.7</span>
</div>
<div class="bg-zinc-950/60 backdrop-blur-md border border-zinc-800 rounded px-2 py-1 flex flex-col items-end">
<span class="text-[9px] text-zinc-500 font-bold uppercase tracking-tighter">WB</span>
<span class="text-xs font-mono text-zinc-100">5500K</span>
</div>
</div>
</div>
<!-- Fractional Zoom Controls -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-zinc-950/40 backdrop-blur-md px-4 py-2 rounded-full border border-zinc-800/50 z-10">
<button class="text-[10px] font-bold text-zinc-400 hover:text-zinc-100 transition-colors">0.6x</button>
<button class="text-[11px] font-black text-violet-400 bg-zinc-900 px-3 py-1 rounded-full border border-zinc-700">1x</button>
<button class="text-[10px] font-bold text-zinc-400 hover:text-zinc-100 transition-colors">2.5x</button>
</div>
<!-- Manual Focus Slider -->
<div class="absolute right-6 top-1/2 -translate-y-1/2 h-48 w-12 flex flex-col items-center justify-between py-4 z-10 pointer-events-auto">
<div class="h-full w-0.5 bg-zinc-800 relative">
<div class="absolute -left-[3px] top-1/4 w-2 h-2 bg-violet-400 rounded-full ring-4 ring-violet-400/20"></div>
<!-- Precision Scale Marks -->
<div class="absolute -left-2 top-0 w-1.5 h-[1px] bg-zinc-600"></div>
<div class="absolute -left-2 top-1/2 w-1.5 h-[1px] bg-zinc-600"></div>
<div class="absolute -left-2 top-full w-1.5 h-[1px] bg-zinc-600"></div>
</div>
<span class="text-[8px] font-black text-zinc-500 rotate-90 absolute -right-4 top-1/2 -translate-y-1/2 whitespace-nowrap tracking-widest">FOCUS</span>
</div>
<!-- Viewfinder Grid (Subtle) -->
<div class="absolute inset-0 pointer-events-none grid grid-cols-3 grid-rows-3 opacity-20">
<div class="border-r border-b border-zinc-100"></div>
<div class="border-r border-b border-zinc-100"></div>
<div class="border-b border-zinc-100"></div>
<div class="border-r border-b border-zinc-100"></div>
<div class="border-r border-b border-zinc-100"></div>
<div class="border-b border-zinc-100"></div>
<div class="border-r border-zinc-100"></div>
<div class="border-r border-zinc-100"></div>
<div></div>
</div>
</main>
<!-- NavigationDrawer / Mode Switcher -->
<div class="h-16 bg-zinc-950 flex items-center justify-center gap-8 border-t border-zinc-900 z-40 overflow-x-auto no-scrollbar px-10">
<button class="text-zinc-500 font-geist text-[10px] uppercase tracking-widest hover:text-zinc-200 transition-all">Photo</button>
<button class="text-zinc-500 font-geist text-[10px] uppercase tracking-widest hover:text-zinc-200 transition-all">Video</button>
<div class="relative flex flex-col items-center group cursor-pointer">
<span class="font-geist font-medium text-sm text-emerald-400 uppercase tracking-widest">Pro</span>
<div class="w-1 h-1 bg-emerald-400 rounded-full mt-1"></div>
</div>
<button class="text-zinc-500 font-geist text-[10px] uppercase tracking-widest hover:text-zinc-200 transition-all">Portrait</button>
<button class="text-zinc-500 font-geist text-[10px] uppercase tracking-widest hover:text-zinc-200 transition-all">Night</button>
</div>
<!-- BottomNavBar (Controls Bar) -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-zinc-950 border-t border-zinc-800 h-32">
<!-- Gallery Preview -->
<div class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-200 transition-all duration-200">
<div class="w-12 h-12 rounded-lg border-2 border-zinc-800 overflow-hidden active:scale-90 transition-transform">
<img alt="Gallery preview" class="w-full h-full object-cover" data-alt="thumbnail of a serene lake reflection at twilight with purple and deep blue sky" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDzi8nOfZ-MwiWHAZ2cg7OdxTLRJPIRLyrretuxKs1hmnaENvA5a8fLn2zKoTz04l3jUsZD3teivW5yhSDrIM__uze7u8eFb1rzjQF-WZ-YHLIlLZ0euXth5ajzjnwBYN_gQW2anJY1SbXNxO4IQbQel8A_yOJbD1er2SfuK5GX8VwRl3r4j73pW0Cq_Rq9tqmm-u6ojBloX2KHomX0jmJMgMmRAsLjxug5cNpcH7ueN3albSeevkFvzf5PEhHbW5wwGUuA2c3Mf0Y"/>
</div>
</div>
<!-- Shutter Button -->
<div class="flex flex-col items-center justify-center text-zinc-100 scale-125">
<button class="w-16 h-16 rounded-full border-4 border-zinc-100 flex items-center justify-center active:scale-90 transition-all duration-200">
<div class="w-12 h-12 rounded-full bg-zinc-100"></div>
</button>
</div>
<!-- Camera Switch -->
<div class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-200 transition-all duration-200">
<button class="w-12 h-12 rounded-full bg-zinc-900 flex items-center justify-center border border-zinc-800 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined text-zinc-100 text-2xl" data-icon="cameraswitch">cameraswitch</span>
</button>
</div>
</footer>
<!-- Overlay Histogram -->
<div class="fixed top-20 left-6 pointer-events-none z-10">
<svg class="opacity-40" height="30" viewbox="0 0 60 30" width="60">
<path d="M0 30 L5 25 L10 28 L15 15 L20 20 L25 5 L30 18 L35 22 L40 10 L45 15 L50 25 L55 22 L60 30 Z" fill="#fafafa"></path>
</svg>
</div>
</body></html>
